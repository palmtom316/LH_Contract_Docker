# Docker Compose - Production Configuration (Low Memory Version)
# 适用于内存受限环境 (4-8GB RAM)
# 使用方法: docker compose -f docker-compose.prod.lowmem.yml up -d

version: '3.8'

services:
  # PostgreSQL Database - 优化内存配置
  db:
    image: postgres:15-alpine
    container_name: lh_contract_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
      # PostgreSQL 内存优化参数
      POSTGRES_INITDB_ARGS: "--encoding=UTF-8"
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=128MB"           # 默认128MB，小内存环境保持
      - "-c"
      - "effective_cache_size=256MB"     # 减少缓存预期
      - "-c"
      - "work_mem=4MB"                   # 减少排序内存
      - "-c"
      - "maintenance_work_mem=64MB"      # 减少维护内存
      - "-c"
      - "max_connections=50"             # 减少最大连接数
      - "-c"
      - "wal_buffers=4MB"                # 减少WAL缓冲
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - lh_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M          # 从 2G 降到 512M
        reservations:
          cpus: '0.25'
          memory: 256M          # 从 512M 降到 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

  # Redis Cache - 优化内存配置
  redis:
    image: redis:7-alpine
    container_name: lh_contract_redis_prod
    restart: always
    command: redis-server --appendonly yes --maxmemory 128mb --maxmemory-policy allkeys-lru --save ""
    # --save "" 禁用RDB快照，减少内存峰值
    volumes:
      - redis_data:/data
    networks:
      - lh_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 192M          # 从无限制到 192M
        reservations:
          cpus: '0.1'
          memory: 64M

  # FastAPI Backend - 优化内存配置
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: lh-contract-backend:latest
    container_name: lh_contract_backend_prod
    restart: always
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      WORKERS: "2"              # 从 4 个 worker 降到 2 个
      ALLOWED_HOSTS: '["*"]'
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:80}
      # Python 内存优化
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
      MALLOC_ARENA_MAX: "2"     # 限制 glibc 内存池
    volumes:
      - ./uploads:/app/uploads
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lh_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M          # 从 2G 降到 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "3"

  # Frontend Service - 优化内存配置
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lh_contract_frontend_prod
    restart: always
    environment:
      VITE_API_BASE_URL: /api/v1
      NODE_OPTIONS: "--max-old-space-size=256"  # 限制 Node.js 堆内存
    ports:
      - "3000:3000"
    networks:
      - lh_network
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 384M          # 限制前端内存
        reservations:
          cpus: '0.1'
          memory: 128M

  # Nginx Reverse Proxy - 轻量级配置
  nginx:
    image: nginx:alpine
    container_name: lh_contract_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - lh_network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 64M           # Nginx 很轻量
        reservations:
          cpus: '0.1'
          memory: 32M
    logging:
      driver: "json-file"
      options:
        max-size: "5m"
        max-file: "2"

networks:
  lh_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
