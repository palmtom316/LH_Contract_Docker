# Pytest Configuration
[pytest]
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
markers =
    asyncio: compatibility marker mapped to anyio in tests/conftest.py

# Coverage Configuration
[coverage:run]
source = app
omit = 
    */tests/*
    */migrations/*
    */__init__.py
    */conftest.py

[coverage:report]
precision = 2
show_missing = True
skip_covered = False

[coverage:html]
directory = htmlcov
