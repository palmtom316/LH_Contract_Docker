# docker-compose.yml — DEVELOPMENT stack
# Default local dev: postgres + backend (uvicorn --reload) + frontend (vite dev) + MinIO.
# For production variants see: docker-compose.prod.yml, docker-compose.prod.balanced.yml,
# docker-compose.prod.lowmem.yml, docker-compose.production.yml, docker-compose.pve-prod.yml.
services:
  # Database
  db:
    image: postgres:15-alpine
    container_name: lh_contract_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lh_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-dev_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-lh_contract_db}
      # Critical for data persistence on existing volume structure
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - lh_network
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lh_admin} -d ${POSTGRES_DB:-lh_contract_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: lh_contract_redis
    restart: always
    networks:
      - lh_network
    ports:
      - "6379:6379"

  # MinIO (S3-compatible Object Storage) - V1.5 NEW
  minio:
    image: minio/minio:latest
    container_name: lh_contract_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin123}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # MinIO Console
    networks:
      - lh_network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lh_contract_backend
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lh_admin}:${POSTGRES_PASSWORD:-dev_password_change_me}@db:5432/${POSTGRES_DB:-lh_contract_db}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:80,http://127.0.0.1:3000}
      UPLOAD_DIR: /app/uploads
      DEBUG: "false"
      # MinIO Configuration - V1.5 NEW
      MINIO_ENDPOINT: minio:9000
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin123}
      MINIO_BUCKET_ACTIVE: contracts-active
      MINIO_BUCKET_ARCHIVE: contracts-archive
    volumes:
      - ./backend/app:/app/app
      - ${HOST_UPLOAD_DIR:-./backend/uploads}:/app/uploads
    ports:
      - "8000:8000"
    networks:
      - lh_network
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_healthy

  # Sync Worker (Feishu Integration V1.4)
  sync-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lh_contract_sync_worker
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lh_admin}:${POSTGRES_PASSWORD:-dev_password_change_me}@db:5432/${POSTGRES_DB:-lh_contract_db}
      FEISHU_APP_ID: ${FEISHU_APP_ID:-}
      FEISHU_APP_SECRET: ${FEISHU_APP_SECRET:-}
      FEISHU_BASE_APP_TOKEN: ${FEISHU_BASE_APP_TOKEN:-}
      FEISHU_BASE_TABLE_ID: ${FEISHU_BASE_TABLE_ID:-}
    command: python run_sync.py
    volumes:
      - ./backend/app:/app/app
      - ${HOST_UPLOAD_DIR:-./backend/uploads}:/app/uploads
    networks:
      - lh_network
    depends_on:
      db:
        condition: service_healthy

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lh_contract_frontend
    restart: always
    environment:
      # Relative path to support Nginx proxy on Port 80
      VITE_API_BASE_URL: /api/v1
      API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - lh_network
    depends_on:
      - backend

  # Nginx Gateway
  nginx:
    image: nginx:alpine
    container_name: lh_contract_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - lh_network

networks:
  lh_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  lh_frontend_node_modules:
  minio_data:
