version: '3.8'

services:
  # Database
  db:
    image: postgres:15-alpine
    container_name: lh_contract_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-lh_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-LanHai2024Secure!}
      POSTGRES_DB: ${POSTGRES_DB:-lh_contract_db}
      # Critical for data persistence on existing volume structure
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - lh_network
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-lh_admin} -d ${POSTGRES_DB:-lh_contract_db}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis
  redis:
    image: redis:7-alpine
    container_name: lh_contract_redis
    restart: always
    networks:
      - lh_network
    ports:
      - "6379:6379"

  # Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: lh_contract_backend
    restart: always
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-lh_admin}:${POSTGRES_PASSWORD:-LanHai2024Secure!}@db:5432/${POSTGRES_DB:-lh_contract_db}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,http://localhost:80,http://127.0.0.1:3000}
      UPLOAD_DIR: /app/uploads
      DEBUG: "false"
    volumes:
      - ./backend/app:/app/app
      - ${HOST_UPLOAD_DIR:-./backend/uploads}:/app/uploads
    ports:
      - "8000:8000"
    networks:
      - lh_network
    depends_on:
      db:
        condition: service_healthy

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: lh_contract_frontend
    restart: always
    environment:
      # Relative path to support Nginx proxy on Port 80
      VITE_API_BASE_URL: /api/v1
      API_PROXY_TARGET: http://backend:8000
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    networks:
      - lh_network
    depends_on:
      - backend

  # Nginx Gateway
  nginx:
    image: nginx:alpine
    container_name: lh_contract_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - backend
    networks:
      - lh_network

networks:
  lh_network:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  lh_frontend_node_modules:
