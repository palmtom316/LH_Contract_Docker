# Docker Compose - Production Configuration (Balanced Version)
# 折中配置：平衡性能与内存使用
# 适用于 6-10GB RAM 环境，20-50 并发用户
# 使用方法: docker compose -f docker-compose.prod.balanced.yml up -d

services:
  # PostgreSQL Database - 折中内存配置
  db:
    image: postgres:15-alpine
    container_name: lh_contract_db_prod
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    command:
      - "postgres"
      - "-c"
      - "shared_buffers=192MB" # 适中的共享缓冲
      - "-c"
      - "effective_cache_size=512MB" # 适中的缓存预期
      - "-c"
      - "work_mem=8MB" # 适中的排序内存
      - "-c"
      - "maintenance_work_mem=128MB" # 维护任务内存
      - "-c"
      - "max_connections=100" # 标准连接数
      - "-c"
      - "wal_buffers=8MB" # WAL缓冲
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - lh_network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M # 折中：768M
        reservations:
          cpus: '0.5'
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Redis Cache - 折中内存配置
  redis:
    image: redis:7-alpine
    container_name: lh_contract_redis_prod
    restart: always
    command: redis-server --appendonly yes --maxmemory 192mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - lh_network
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 5s
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M # 折中：256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # FastAPI Backend - 折中配置 (3 workers)
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    image: lh-contract-backend:latest
    container_name: lh_contract_backend_prod
    restart: always
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      SECRET_KEY: ${SECRET_KEY}
      DEBUG: "false"
      WORKERS: "3" # 折中：3 个 worker
      ALLOWED_HOSTS: '["*"]'
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:80}
      PYTHONUNBUFFERED: "1"
      PYTHONDONTWRITEBYTECODE: "1"
    volumes:
      - ${HOST_UPLOAD_DIR:-./uploads}:/app/uploads
      - ./logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - lh_network
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    deploy:
      resources:
        limits:
          cpus: '1.5'
          memory: 768M # 折中：768M
        reservations:
          cpus: '0.5'
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"

  # Frontend Service - 折中配置
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
    container_name: lh_contract_frontend_prod
    restart: always
    expose:
      - "80"
    networks:
      - lh_network
    depends_on:
      - backend
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M # 折中：512M
        reservations:
          cpus: '0.1'
          memory: 256M

  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: lh_contract_nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/prod.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    depends_on:
      - backend
      - frontend
    networks:
      - lh_network
    healthcheck:
      test: [ "CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health" ]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 128M # Nginx 轻量
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  lh_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.20.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
