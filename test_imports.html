<!DOCTYPE html>
<html>
<head>
    <title>Import Test</title>
</head>
<body>
    <h1>Module Import Test</h1>
    <div id="result"></div>
    <script type="module">
        const results = [];
        
        // Test 1: Basic import
        try {
            await import('/src/views/contracts/UpstreamList.vue');
            results.push('✓ UpstreamList.vue loaded');
        } catch (e) {
            results.push('✗ UpstreamList.vue: ' + e.message);
        }
        
        // Test 2: Downstream
        try {
            await import('/src/views/contracts/DownstreamList.vue');
            results.push('✓ DownstreamList.vue loaded');
        } catch (e) {
            results.push('✗ DownstreamList.vue: ' + e.message);
        }
        
        // Test 3: Management
        try {
            await import('/src/views/contracts/ManagementList.vue');
            results.push('✓ ManagementList.vue loaded');
        } catch (e) {
            results.push('✗ ManagementList.vue: ' + e.message);
        }
        
        // Test 4: file-saver
        try {
            await import('file-saver');
            results.push('✓ file-saver loaded');
        } catch (e) {
            results.push('✗ file-saver: ' + e.message);
        }
        
        document.getElementById('result').innerHTML = results.join('<br>');
    </script>
</body>
</html>
