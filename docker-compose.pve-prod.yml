# docker-compose.pve-prod.yml — PRODUCTION on Proxmox VE host
# PVE-specific resource limits and volume mounts. Not for local / generic cloud use.
# Usage: docker compose -f docker-compose.pve-prod.yml up -d
services:
  db:
    image: postgres:15-alpine
    container_name: lh_contract_db
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /opt/lh-contract/backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      lh_network:
        aliases:
          - db

  redis:
    image: redis:7-alpine
    container_name: lh_contract_redis
    restart: always
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      lh_network:
        aliases:
          - redis

  minio:
    image: minio/minio:latest
    container_name: lh_contract_minio
    restart: always
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    ports:
      - "9000:9000"
      - "9001:9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3
    networks:
      lh_network:
        aliases:
          - minio

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    container_name: lh_contract_backend
    restart: always
    env_file:
      - .env.production
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
      BACKUP_TMP_DIR: /tmp/lh_contract_backups
      DEBUG: "false"
      MINIO_ENDPOINT: minio:9000
    volumes:
      - /mnt/data/contract_uploads:/app/uploads
      - /opt/lh-contract/logs:/app/logs
      - /opt/lh-contract/backups:/app/archives
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      lh_network:
        aliases:
          - backend

  sync-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile.production
    container_name: lh_contract_sync_worker
    restart: always
    env_file:
      - .env.production
    command: python run_sync.py
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      REDIS_URL: redis://redis:6379/0
      UPLOAD_DIR: /app/uploads
      BACKUP_TMP_DIR: /tmp/lh_contract_backups
      MINIO_ENDPOINT: minio:9000
    volumes:
      - /mnt/data/contract_uploads:/app/uploads
      - /opt/lh-contract/logs:/app/logs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      disable: true
    networks:
      lh_network:
        aliases:
          - sync-worker

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.production
    container_name: lh_contract_frontend
    restart: always
    expose:
      - "80"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      backend:
        condition: service_healthy
    networks:
      lh_network:
        aliases:
          - frontend

  nginx:
    image: nginx:alpine
    container_name: lh_contract_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/pve-prod.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1/health/ready"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      lh_network:
        aliases:
          - nginx

networks:
  lh_network:
    name: lh-contract_lh_network
    external: true

volumes:
  postgres_data:
  redis_data:
  minio_data:
